<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Film Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">🎬 Film Tracker</div>
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Søk på film eller serie..."
        />
        <button id="searchBtn">Søk</button>
      </div>
      <nav>
        <button class="tab active" id="tabSearch">Utforsk</button>
        <button class="tab" id="tabList">
          Min liste <span id="listCount" class="badge">0</span>
        </button>
      </nav>
    </header>

    <main>
      <!-- Søk-seksjon -->
      <section id="searchSection">
        <p class="hint" id="searchHint">Søk på en film eller serie ovenfor ☝️</p>
        <div id="loadingMsg" class="loading hidden">Laster...</div>
        <div id="errorMsg" class="error hidden"></div>
        <div id="movieGrid" class="movie-grid"></div>
      </section>

      <!-- Min liste-seksjon -->
      <section id="listSection" class="hidden">
        <div class="filter-bar">
          <button class="filter active" data-filter="all">Alle</button>
          <button class="filter" data-filter="unseen">Vil se</button>
          <button class="filter" data-filter="seen">Sett ✅</button>
        </div>
        <p class="empty-msg hidden" id="emptyMsg">Ingen filmer her enda.</p>
        <div id="listGrid" class="movie-grid"></div>
      </section>
    </main>

    <script src="model.js"></script>
    <script src="view.js"></script>
    <script src="controller.js"></script>
  </body>
</html>
